services:
  postgres:
    image: postgres:16-alpine
    container_name: jk-flipping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jk_flipping
      POSTGRES_USER: jk_user
      POSTGRES_PASSWORD: jk_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jk_user -d jk_flipping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jk-flipping-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  grid-worker:
    build:
      context: ./apps/python-workers/grid_worker
      dockerfile: Dockerfile
    container_name: jk-flipping-grid-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONUNBUFFERED: "1"

  uao_grid:
    build:
      context: ./apps/UAO_Grid
      dockerfile: Dockerfile
    container_name: jk-flipping-uao-grid
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      UAO_NAME: "UAO_Grid_okx"
      UAO_RUNTIME: "docker-compose"
      WEBHOOK_URL: "http://host.docker.internal:4000/api/webhook/grid"
      PYTHONUNBUFFERED: "1"
    env_file:
      - ./apps/UAO_Grid/.env
    volumes:
      - ./apps/UAO_Grid:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  uao_grid_v2:
    build:
      context: ./apps/UAO_Grid_V2
      dockerfile: Dockerfile
    container_name: jk-flipping-uao-grid_v2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      UAO_NAME: "UAO_Grid_V2"
      UAO_RUNTIME: "docker-compose"
      WEBHOOK_URL: "http://host.docker.internal:4000/api/webhook/grid"
      PYTHONUNBUFFERED: "1"
    env_file:
      - ./apps/UAO_Grid/.env
    volumes:
      - ./apps/UAO_Grid_v2:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
